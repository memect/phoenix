name: Feature Request
description: 提议新功能或改进建议 / Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前检查 / Pre-submission Checklist
      options:
        - label: 我已搜索过现有 [Issues](../../issues) 和 [Discussions](../../discussions)，确认此需求尚未提出 / I have searched existing Issues and Discussions and this has not been requested
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 背景与问题 / Problem Statement
      description: 描述你遇到的问题或痛点 / Describe the problem or pain point you're experiencing.
      placeholder: |
        目前的痛点是... / The current pain point is...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案 / Proposed Solution
      description: 描述你希望实现的功能 / Describe the feature you'd like to see implemented.
      placeholder: |
        我希望能够... / I would like to be able to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      description: 描述你考虑过的其他方案 / Describe any alternative solutions or features you've considered.

  - type: textarea
    id: additional-context
    attributes:
      label: 补充信息 / Additional Context
      description: 添加任何有助于理解此功能请求的上下文、截图或参考链接 / Add any other context, screenshots, or reference links about the feature request.
