name: Python Package

on:
  push:
    tags:
      - "extract-agent-*-released"
  workflow_dispatch:

jobs:
  check-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install extract-agent
        run: |
          uv sync --index-url https://pypi.org/simple

      - name: Verify CLI entry points
        run: |
          uv run agentic-extract --help
          uv run xdev --help
          uv run xdev-config --help
          uv run tree-sitter-cli --help
          uv run pdf-ai-explorer --help

  build:
    needs: [check-install]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel and sdist
        run: |
          uv build

      - name: Check package metadata
        run: |
          uvx --from twine twine check --strict dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/extract-agent-')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create and Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: docs/CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish extract-agent to PyPI
        run: |
          uv publish dist/* \
            --check-url https://pypi.org/simple/ \
            --trusted-publishing never \
            --token ${{ secrets.PYPI_TOKEN }}
